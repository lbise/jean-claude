version: 1
mode: chat
base_layers:
  - base/jeanclaude.md
  - base/policies.md
mode_prompt: modes/chat.md
tools_catalog: tools/catalog.yaml
initial_state: active

states:
  active:
    tools:
      - bash.run
    task_context: |
      Continue open conversation.
      Answer naturally and concisely.
      If machine interaction is needed, use tools.
      Use `tool_calls` when running commands and keep `assistant_message` short.
    output_schema: schemas/turn.chat.json
    transitions:
      - to: active
