version: 1
mode: open_chat
base_layers:
  - base/jeanclaude.md
  - base/policies.md
mode_prompt: modes/chat.md
skills_catalog: skills/catalog.yaml
initial_state: active

states:
  active:
    task_context: |
      Continue open conversation.
      Answer the user naturally and concisely.
      Use known profile context when relevant.
    output_schema: schemas/turn.chat.json
    transitions:
      - to: active
